<!DOCTYPE html>

<body>
        <!-- navbar -->
        <div uk-sticky="" class="">
            <nav class="uk-navbar-container">
                <div class="uk-container uk-container-expand">
                    <div uk-navbar="dropbar: true; dropbar-anchor: !.uk-navbar-container" class="uk-navbar">
                        <div class="uk-navbar-left">
                            <img class="uk-navbar-item uk-logo" src="images/logos/idee卓悅設計-logo.png" alt="">
                        </div>
                        <div class="uk-navbar-right">
                            <ul class="uk-navbar-nav">
                                <li><a href="">HOME</a></li>
                            </ul>
                            <a class="uk-navbar-toggle uk-navbar-toggle-animate uk-icon uk-navbar-toggle-icon" href="" uk-navbar-toggle-icon="" role="button" aria-haspopup="true"><svg width="20" height="20" viewBox="0 0 20 20"></svg></a>
                            <div class="uk-navbar-dropdown uk-drop uk-navbar-dropdown-dropbar" uk-drop="mode: click; cls-drop: uk-navbar-dropdown; boundary: !.uk-navbar; stretch: x; flip: false; target-y: !.uk-navbar-container" style="overflow-x: auto; top: 80px; left: 0px; width: 1571px; max-width: 1571px;">

                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>
        </div>

        <!-- kenburns slideshow -->
        <div class="uk-position-relative uk-visible-toggle uk-light" tabindex="-1" animation="scale" uk-slideshow="ratio: false; autoplay: true; autoplay-interval: 8000;">

            <div class="uk-slideshow-items" uk-height-viewport="offset-top: true; offset-bottom:10">
                <div>
                    <div class="uk-position-cover uk-animation-kenburns uk-animation-reverse uk-transform-origin-center-left">
                        <img src="images/index/slideshow/cozy-style.jpeg" alt="" uk-cover>
                    </div>
                </div>
                <div>
                    <div class="uk-position-cover uk-animation-kenburns uk-animation-reverse uk-transform-origin-top-right">
                        <img src="images/index/slideshow/modern-fashion.jpeg" alt="" uk-cover>
                    </div>
                </div>
                <div>
                    <div class="uk-position-cover uk-animation-kenburns uk-animation-reverse uk-transform-origin-bottom-left">
                        <img src="images/index/slideshow/nordic-style.png" alt="" uk-cover>
                    </div>
                </div>
                <div>
                    <div class="uk-position-cover uk-animation-kenburns uk-animation-reverse uk-transform-origin-bottom-left">
                        <img src="images/index/slideshow/zen-home.jpeg" alt="" uk-cover>
                    </div>
                </div>
            </div>
        
            <a class="uk-position-center-left uk-position-small uk-hidden-hover" href uk-slidenav-previous uk-slideshow-item="previous"></a>
            <a class="uk-position-center-right uk-position-small uk-hidden-hover" href uk-slidenav-next uk-slideshow-item="next"></a>
